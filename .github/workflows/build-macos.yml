name: Build macOS app

# Builds the .app on a macOS runner (can't be done on Windows), packages a .dmg,
# uploads it as a workflow artifact, and — when run for a release/tag — attaches
# the .dmg (+ .sha256) to that GitHub Release so the cross-platform auto-updater
# can serve it.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the .dmg to (e.g. v6.2.0). Leave blank to only build an artifact."
        required: false
        default: ""
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-macos:
    # Intel runner → x86_64 build that runs on Intel Macs natively and on
    # Apple Silicon via Rosetta 2 (one binary covers every Mac).
    runs-on: macos-13
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build the app icon (.icns)
        run: |
          python build/make_iconset.py
          iconutil -c icns build/MICO360.iconset -o mico360/resources/app.icns

      - name: Build the .app with PyInstaller
        run: |
          pyinstaller build/mico360_macos.spec --noconfirm --distpath dist --workpath build/_work
          test -d "dist/MICO360 Doc Toolkit.app" || (echo "::error::.app was not produced" && exit 1)

      - name: Smoke-test the bundle (it must launch)
        run: |
          BIN="dist/MICO360 Doc Toolkit.app/Contents/MacOS/MICO360DocToolkit"
          QT_QPA_PLATFORM=offscreen "$BIN" & PID=$!
          sleep 12
          if kill -0 $PID 2>/dev/null; then echo "launched OK"; kill $PID; else echo "::error::app exited early"; exit 1; fi

      - name: Package the .dmg (+ sha256)
        run: |
          VER=$(python -c "import re;print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('mico360/__init__.py').read()).group(1))")
          echo "VER=$VER" >> "$GITHUB_ENV"
          STAGE=dist/dmg
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          cp -R "dist/MICO360 Doc Toolkit.app" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "MICO360 Doc Toolkit" -srcfolder "$STAGE" \
            -ov -format UDZO "dist/MICO360-DocToolkit-$VER.dmg"
          cp "dist/MICO360-DocToolkit-$VER.dmg" "dist/MICO360-DocToolkit-Latest.dmg"
          cd dist
          for f in "MICO360-DocToolkit-$VER.dmg" "MICO360-DocToolkit-Latest.dmg"; do
            shasum -a 256 "$f" | awk '{printf "%s  %s", $1, "'"$f"'"}' > "$f.sha256"
          done
          ls -lh MICO360-DocToolkit-*.dmg

      - name: Upload .dmg as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MICO360-macOS-dmg
          path: |
            dist/MICO360-DocToolkit-*.dmg
            dist/MICO360-DocToolkit-*.dmg.sha256

      - name: Attach .dmg to the release (release event or tag input)
        if: ${{ github.event_name == 'release' || github.event.inputs.tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}${{ github.event.inputs.tag }}"
          gh release upload "$TAG" \
            dist/MICO360-DocToolkit-*.dmg dist/MICO360-DocToolkit-*.dmg.sha256 \
            --clobber --repo "${{ github.repository }}"
